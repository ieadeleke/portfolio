    function randGlyph(seed) { return POOL[hash(seed) % POOL.length]; }

    function buildHand(lines) {

      ctx.globalAlpha = 1;
      raf = requestAnimationFrame(draw);
    }

    function onMove(e) { pointer.tx = (e.clientX / window.innerWidth - 0.5) * 2; pointer.ty = (e.clientY / window.innerHeight - 0.5) * 2; }
    var resizeTimer = 0;
    function onResize() { clearTimeout(resizeTimer); resizeTimer = setTimeout(function () { build(); if (reduceMotion) draw(0); }, 150); }

    build(); raf = requestAnimationFrame(draw);
